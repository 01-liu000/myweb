<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>嫁给我好吗？</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,"Microsoft YaHei",sans-serif}
html,body{height:100%;overflow-x:hidden}
body{background:#fdf2f8;color:#222}
.wrap{max-width:700px;margin:0 auto;padding:60px 20px;text-align:center;position:relative;z-index:2}
h1{font-size:28px;color:#d92a73;margin-bottom:10px}
.sub{font-size:16px;color:#666;margin-bottom:30px}
.heart-bg{font-size:90px;animation:beat 1.2s infinite alternate ease-in-out;margin:20px 0}
@keyframes beat{0%{transform:scale(1)}100%{transform:scale(1.18)}}
.question{font-size:24px;margin:30px 0;font-weight:600}
.btns{display:flex;justify-content:center;gap:20px;margin-top:40px}
button{padding:14px 36px;border:none;border-radius:40px;font-size:17px;cursor:pointer;transition:.25s}
#yes{background:#e61e72;color:white}
#yes:active{transform:scale(.96)}
#no{background:#ccc;color:#555}
.success{display:none;margin-top:60px;animation:fadeIn 1.2s forwards}
.success h2{font-size:32px;color:#e61e72}
.success p{margin-top:12px;font-size:18px;line-height:1.7}
@keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.heart-fall{position:fixed;top:-10vh;z-index:1;color:#e61e72;font-size:20px;pointer-events:none;animation:fall linear infinite}
@keyframes fall{to{transform:translateY(110vh) rotate(360deg)}}
#fireworks{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}
</style>
</head>
<body>
<canvas id="fireworks"></canvas>
<div class="wrap">
<h1>亲爱的，我想和你过一辈子</h1>
<p class="sub">世界那么大，还是遇见你，是我最大的幸运</p>
<div class="heart-bg">❤️</div>
<div class="question">你愿意嫁给我吗？</div>
<div class="btns">
<button id="yes">我愿意</button>
<button id="no">不愿意</button>
</div>
<div class="success" id="successBox">
<h2>💍 我愿意！</h2>
<p>往后余生，风雪是你，平淡是你</p>
<p>清贫是你，荣华是你，心底温柔也是你</p>
<p>目光所至，皆是你</p>
</div>
</div>

<audio id="bgm" loop>
<source src="https://cdn.jsdelivr.net/gh/fox3000/CDN@master/music/love.mp3" type="audio/mpeg">


<script>
const bgm = document.getElementById('bgm');
document.addEventListener('touchstart',()=>{bgm.play()},{once:true});
window.onload=()=>{bgm.play().catch(()=>{})};

const no = document.getElementById('no');
no.addEventListener('mouseover',moveBtn);
no.addEventListener('touchstart',moveBtn);
function moveBtn(e){
e.preventDefault();
no.style.position='fixed';
let x=Math.random()*(window.innerWidth-120);
let y=Math.random()*(window.innerHeight-80);
no.style.left=x+'px';
no.style.top=y+'px';
}

document.getElementById('yes').onclick=()=>{
document.querySelector('.success').style.display='block';
startFireworks();
};

function createHeart(){
const h=document.createElement('div');
h.classList.add('heart-fall');
h.innerText='❤️';
h.style.left=Math.random()*100+'vw';
h.style.animationDuration=(3+Math.random()*4)+'s';
h.style.opacity=(0.6+Math.random()*0.4).toFixed(2);
document.body.appendChild(h);
setTimeout(()=>h.remove(),7000);
}
setInterval(createHeart,300);

const canvas=document.getElementById('fireworks');
const ctx=canvas.getContext('2d');
function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight}
window.addEventListener('resize',resize);resize();
let particles=[];
function rand(min,max){return Math.random()*(max-min)+min}
class Particle{
constructor(x,y){
this.x=x;this.y=y;this.speed=rand(2,6);this.angle=rand(0,Math.PI*2);
this.gravity=0.03;this.vx=Math.cos(this.angle)*this.speed;
this.vy=Math.sin(this.angle)*this.speed;this.alpha=1;
this.decay=rand(0.005,0.01);this.color=`hsl(${rand(0,60)},100%,60%)`;
}
update(){this.vy+=this.gravity;this.x+=this.vx;this.y+=this.vy;this.alpha-=this.decay}
draw(){ctx.globalAlpha=this.alpha;ctx.fillStyle=this.color;ctx.beginPath();
ctx.arc(this.x,this.y,2,0,Math.PI*2);ctx.fill()}
}
function boom(x,y){for(let i=0;i<100;i++)particles.push(new Particle(x,y))}
function startFireworks(){let count=0;const itv=setInterval(()=>{
boom(rand(100,window.innerWidth-100),rand(50,window.innerHeight/2));
count++;if(count>12)clearInterval(itv)},300)}
function loop(){ctx.clearRect(0,0,canvas.width,canvas.height);
particles=particles.filter(p=>p.alpha>0);
particles.forEach(p=>{p.update();p.draw()});requestAnimationFrame(loop)}
loop();
</script>
</body>
</html>
